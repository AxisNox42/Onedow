name: macOS Build

# 수동 실행(Actions 탭의 "Run workflow") + main 푸시 시 자동 빌드
on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    # macos-latest = Apple Silicon(arm64) 러너 → 줄이 짧음.
    # 여기서 universal(arm64 + x86_64) 로 빌드하면
    # Intel 맥·M칩 맥 모두 네이티브 실행 (Rosetta 불필요) = 단일 파일로 전부 호환
    runs-on: macos-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ── 일본어 폰트 자동 다운로드 (macOS 에서 일본어 가나 표시용) ──
      #    번들 폰트(Dongle/Oswald)엔 가나가 없어서, 정적 TTF(글리프) 하나를
      #    NotoSansJP-Regular.ttf 이름으로 받아 Resource/Font 에 배치.
      #    (실패해도 빌드는 계속 — 일본어만 안 보임)
      - name: Fetch Japanese font
        run: |
          mkdir -p WiNILL/Resource/Font
          curl -fL -o WiNILL/Resource/Font/NotoSansJP-Regular.ttf \
            "https://raw.githubusercontent.com/google/fonts/main/ofl/sawarabigothic/SawarabiGothic-Regular.ttf" \
            && echo "JP font OK" || echo "JP font fetch failed (Japanese will be blank on macOS)"

      # ── GLFW 를 정적(static) · 유니버설로 직접 빌드 ──
      #    → 최종 바이너리가 GLFW dylib 에 의존하지 않아 어디서나 실행 가능
      - name: Build GLFW (static, universal)
        run: |
          git clone --depth 1 --branch 3.4 https://github.com/glfw/glfw.git glfw-src
          cmake -S glfw-src -B glfw-src/build \
            -DBUILD_SHARED_LIBS=OFF \
            -DGLFW_BUILD_EXAMPLES=OFF \
            -DGLFW_BUILD_TESTS=OFF \
            -DGLFW_BUILD_DOCS=OFF \
            -DCMAKE_INSTALL_PREFIX="${{ github.workspace }}/glfw-install" \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          cmake --build glfw-src/build --config Release
          cmake --install glfw-src/build

      # ── 게임 빌드 (universal) ──
      - name: Configure & build Onedow
        run: |
          cmake -B build \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_PREFIX_PATH="${{ github.workspace }}/glfw-install" \
            -DCMAKE_OSX_ARCHITECTURES="arm64;x86_64"
          cmake --build build --config Release

      # ── 패키징 (바이너리 + 폰트) ──
      - name: Package
        run: |
          mkdir -p dist/Onedow
          cp build/WiNILL dist/Onedow/Onedow
          cp -R WiNILL/Resource dist/Onedow/Resource
          # 임시(ad-hoc) 서명 — Apple Silicon 에서 "손상됨" 강제종료 방지에 도움
          codesign --force --deep --sign - dist/Onedow/Onedow || true
          chmod +x dist/Onedow/Onedow
          cd dist && zip -r Onedow-macOS.zip Onedow
          # 확인용: 어떤 아키텍처가 들어갔는지 로그 출력
          echo "=== lipo info ===" && lipo -info Onedow/Onedow || true

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: Onedow-macOS
          path: dist/Onedow-macOS.zip
          if-no-files-found: error
